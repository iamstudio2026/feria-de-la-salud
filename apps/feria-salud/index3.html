<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feria de la Salud - Lazos del Bienestar (SNSP Tamaulipas)</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --guinda: #9b2247;
            --guinda-dark: #611232;
            --dorado: #a57f2c;
            --verde: #1e5b4f;
            --gris: #98989A;
            --negro: #161a1d;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
        }

        .font-patria {
            font-family: 'Playfair Display', serif;
        }

        /* Animación suave para elementos destacados */
        .pulse-badge {
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(155, 34, 71, 0.7);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(155, 34, 71, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(155, 34, 71, 0);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- CALENDARIO 2026 ---
        const calendarData = [
            // --- Ferias SNSP ---
            { date: "26 Feb", city: "Ciudad Victoria", type: "Feria de Arranque", status: "Próximo", org: "SNSP" },
            { date: "11 Mar", city: "Altamira", type: "Feria Regional", status: "Programado", org: "SNSP" },
            { date: "25 Mar", city: "El Mante", type: "Feria de Salud", status: "Programado", org: "SNSP" },
            { date: "17 Jun", city: "Padilla", type: "Feria Comunitaria", status: "Programado", org: "SNSP" },
            { date: "09 Ago", city: "Jaumave", type: "Feria Altiplano", status: "Programado", org: "SNSP" },
            { date: "09 Sep", city: "Ciudad Victoria", type: "Seguimiento", status: "Programado", org: "SNSP" },
            { date: "19 Oct", city: "San Fernando", type: "Feria Rosa (Cáncer)", status: "Programado", org: "SNSP" },
            { date: "28 Oct", city: "Matamoros", type: "Macro Feria", status: "Programado", org: "SNSP" },
            { date: "11 Nov", city: "Reynosa", type: "Feria Frontera", status: "Programado", org: "SNSP" },
            { date: "12 Nov", city: "Tampico", type: "Cierre Anual", status: "Programado", org: "SNSP" },
            // --- Corredores de Salud DIF ---
            { date: "11 Feb", city: "Victoria 1 - Echeverría", type: "Corredor DIF", status: "Realizado", org: "DIF" },
            { date: "26 Feb", city: "Victoria 2 - Pajaritos", type: "Corredor DIF", status: "Próximo", org: "DIF" },
            { date: "14 Abr", city: "Laredo - Villas de San Miguel", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "17 Abr", city: "San Fernando - Loma Alta", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "28 Abr", city: "Reynosa - Jarachina Sur", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "30 Abr", city: "Matamoros - Popular", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "05 May", city: "Tula - Cabecera Municipal", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "07 May", city: "Mante - Aviación", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "30 Jun", city: "Tampico - Moscú", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "02 Jul", city: "Tampico - Borreguera", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "07 Jul", city: "Madero - Francisco Villa", type: "Corredor DIF", status: "Programado", org: "DIF" },
            { date: "09 Jul", city: "Altamira - Los Prados", type: "Corredor DIF", status: "Programado", org: "DIF" }
        ];

        // --- MODELO GOLI AJUSTADO (PRONAM + DOC Cáncer) ---
        const areasData = [
            {
                id: 1,
                goli: "INTELIGENCIA",
                title: "Identificación de Riesgos",
                subtitle: "Triaje Social y Epidemiológico",
                icon: "fa-users-viewfinder",
                color: "bg-[#9b2247]",
                lightColor: "bg-red-50",
                description: "Filtro activo para identificar población objetivo del PRONAM y mujeres en edad de riesgo para cáncer.",
                services: [
                    {
                        title: "Censo Materno-Infantil (1000 Días)",
                        desc: "Captación dirigida de embarazadas y menores de 2 años para ingreso al protocolo PRONAM.",
                        icon: "fa-person-pregnant"
                    },
                    {
                        title: "Triaje Rosa",
                        desc: "Cuestionario de factores de riesgo para cáncer de mama y cervicouterino para priorizar atención.",
                        icon: "fa-notes-medical"
                    },
                    {
                        title: "Registro Unificado SNSP",
                        desc: "Alta en plataforma para trazabilidad y seguimiento nominal.",
                        icon: "fa-id-card"
                    }
                ]
            },
            {
                id: 2,
                goli: "OPERACIONES",
                title: "Gestión Clínica Resolutiva",
                subtitle: "Atención Especializada",
                icon: "fa-user-doctor",
                color: "bg-[#1e5b4f]",
                lightColor: "bg-teal-50",
                description: "Módulos clínicos enfocados en la resolución inmediata y la detección temprana.",
                services: [
                    {
                        title: "Módulo Cáncer de la Mujer",
                        desc: "Toma de Papanicolaou (VPH), Exploración Mamaria Clínica, iBreast (Tamizaje eléctrico) y Vales de Mastografía.",
                        icon: "fa-ribbon"
                    },
                    {
                        title: "Módulo PRONAM 1000 Días",
                        desc: "Control prenatal, evaluación nutricional, tamizaje de neurodesarrollo (EDI), vacunas y consejería en lactancia.",
                        icon: "fa-baby"
                    },
                    {
                        title: "Medicina General e Integrada",
                        desc: "Atención a crónicos, agudos y salud bucal preventiva.",
                        icon: "fa-stethoscope"
                    }
                ]
            },
            {
                id: 3,
                goli: "LOGÍSTICA",
                title: "Insumos para el Bienestar",
                subtitle: "Soporte Terapéutico",
                icon: "fa-boxes-packing",
                color: "bg-[#a57f2c]",
                lightColor: "bg-yellow-50",
                description: "Aseguramiento de la cadena de suministros para el tratamiento completo.",
                services: [
                    {
                        title: "Suplementación PRONAM",
                        desc: "Entrega de hierro, ácido fólico y polivitamínicos para embarazadas e infantes.",
                        icon: "fa-capsules"
                    },
                    {
                        title: "Farmacia Gratuita",
                        desc: "Surtimiento inmediato de recetas generadas en los módulos de atención.",
                        icon: "fa-prescription-bottle-medical"
                    },
                    {
                        title: "Logística de Muestras",
                        desc: "Red de frío y transporte seguro para citologías (Paps) y tamices neonatales.",
                        icon: "fa-truck-fast"
                    }
                ]
            },
            {
                id: 4,
                goli: "CeCoSaBi",
                title: "Continuidad del Cuidado",
                subtitle: "Cierre de Brechas",
                icon: "fa-network-wired",
                color: "bg-[#161a1d]",
                lightColor: "bg-gray-200",
                description: "Garantizando el seguimiento para casos sospechosos o de alto riesgo detectados.",
                services: [
                    {
                        title: "Navegación Pacientes Oncológicos",
                        desc: "Gestión prioritaria de citas para biopsias o colposcopías ante resultados sospechosos.",
                        icon: "fa-file-medical-alt"
                    },
                    {
                        title: "Referencia Hospitalaria PRONAM",
                        desc: "Vinculación directa a hospitales resolutivos para partos o urgencias obstétricas.",
                        icon: "fa-hospital"
                    },
                    {
                        title: "Telemedicina y Resultados",
                        desc: "Seguimiento telefónico para entrega de resultados de estudios no inmediatos.",
                        icon: "fa-phone-volume"
                    }
                ]
            }
        ];

        // --- COMPONENTES ---

        const Header = () => (
            <header className="bg-white shadow-md sticky top-0 z-50">
                {/* Barra Institucional Superior */}
                <div className="bg-[#002f2a] text-white text-xs py-1 px-4 flex justify-center items-center gap-4">
                    <span>Secretaría de Salud Tamaulipas</span>
                    <span className="opacity-50">•</span>
                    <span>DIF Tamaulipas</span>
                    <span className="opacity-50">•</span>
                    <span>Servicio Nacional de Salud Pública</span>
                </div>

                <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                    {/* Logos Institucionales */}
                    <div className="flex items-center gap-3 flex-wrap justify-center md:justify-start">
                        {/* Logo Secretaría de Salud */}
                        <img
                            src="logo salud.png"
                            alt="Secretaría de Salud"
                            className="h-12 md:h-16 object-contain"
                            title="Secretaría de Salud"
                        />
                        <div className="h-10 w-px bg-gray-300 hidden md:block"></div>
                        {/* Logo SNSP */}
                        <img
                            src="logo SNSP.png"
                            alt="SNSP - Servicio Nacional de Salud Pública"
                            className="h-10 md:h-14 object-contain"
                            title="Servicio Nacional de Salud Pública"
                        />
                        <div className="h-10 w-px bg-gray-300 hidden md:block"></div>
                        {/* Logo DIF Tamaulipas */}
                        <img
                            src="dif.png"
                            alt="DIF Tamaulipas"
                            className="h-10 md:h-14 object-contain"
                            title="DIF Tamaulipas"
                        />
                    </div>

                    {/* Branding Margarita Maza */}
                    <div className="flex items-center">
                        <img
                            src="Margarita Maza.png"
                            alt="2026 - Año de Margarita Maza"
                            className="h-14 md:h-20 object-contain"
                            title="2026 - Año de Margarita Maza"
                        />
                    </div>
                </div>

                {/* Franja decorativa tricolor institucional */}
                <div className="flex h-1 w-full">
                    <div className="w-1/3 bg-[#1e5b4f]"></div>
                    <div className="w-1/3 bg-[#9b2247]"></div>
                    <div className="w-1/3 bg-[#a57f2c]"></div>
                </div>
            </header>
        );

        const Hero = () => (
            <section className="relative bg-[#1e5b4f] text-white py-16 px-4 overflow-hidden">
                {/* Elementos de fondo abstractos */}
                <div className="absolute top-0 right-0 w-64 h-64 bg-[#a57f2c] rounded-full opacity-10 blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                <div className="absolute bottom-0 left-0 w-64 h-64 bg-[#9b2247] rounded-full opacity-10 blur-3xl transform -translate-x-1/2 translate-y-1/2"></div>

                <div className="container mx-auto relative z-10 text-center">
                    <div className="inline-block mb-4 px-4 py-1 rounded-full border border-[#e6d194] text-[#e6d194] text-xs font-bold tracking-widest uppercase">
                        Estrategia Tamaulipas
                    </div>
                    <h1 className="text-3xl md:text-5xl font-patria font-bold mb-6 leading-tight">
                        Ferias de la Salud <br />
                        <span className="text-white">"Todos por tu Salud"</span>
                    </h1>
                    <p className="max-w-3xl mx-auto text-lg text-gray-200 mb-8 font-light">
                        Implementando un modelo de cuidado integral con enfoque prioritario en la <strong>Detección Oportuna de Cáncer Cervicouterino</strong>, <strong>Cáncer de Mama</strong> y los <strong>Primeros 1000 Días</strong>.
                    </p>

                    <div className="flex flex-wrap justify-center gap-4">
                        <div className="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/20">
                            <i className="fa-solid fa-ribbon text-pink-400"></i>
                            <span className="text-sm font-semibold">Cáncer de la Mujer</span>
                        </div>
                        <div className="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/20">
                            <i className="fa-solid fa-baby text-blue-300"></i>
                            <span className="text-sm font-semibold">PRONAM 1000 Días</span>
                        </div>
                    </div>
                </div>
            </section>
        );

        const CalendarGrid = () => {
            const [filter, setFilter] = useState('Todas');
            const filtered = filter === 'Todas' ? calendarData : calendarData.filter(e => e.org === filter);

            return (
                <section className="py-16 bg-white">
                    <div className="container mx-auto px-4">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-10 border-b border-gray-200 pb-4">
                            <div>
                                <h2 className="text-3xl font-patria font-bold text-[#161a1d]">Calendario 2026</h2>
                                <p className="text-[#9b2247] font-medium mt-1">GERENCIA: Ruta de Intervención Territorial</p>
                            </div>
                            <div className="flex gap-2 mt-4 md:mt-0">
                                {['Todas', 'SNSP', 'DIF'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setFilter(tab)}
                                        className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wide transition-all ${filter === tab
                                            ? (tab === 'DIF' ? 'bg-[#9b2247] text-white' : tab === 'SNSP' ? 'bg-[#1e5b4f] text-white' : 'bg-[#161a1d] text-white')
                                            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                            }`}
                                    >
                                        {tab === 'Todas' ? `Todas (${calendarData.length})` : `${tab} (${calendarData.filter(e => e.org === tab).length})`}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                            {filtered.map((event, idx) => {
                                const isDIF = event.org === 'DIF';
                                const borderColor = isDIF ? '#9b2247' : '#1e5b4f';
                                const badgeBg = isDIF ? 'bg-[#9b2247]/10 text-[#9b2247]' : 'bg-[#1e5b4f]/10 text-[#1e5b4f]';
                                const orgBadgeBg = isDIF ? 'bg-[#9b2247]' : 'bg-[#1e5b4f]';

                                return (
                                    <div key={idx} className="group relative bg-gray-50 p-4 rounded-lg border-l-4 hover:shadow-lg transition-all" style={{ borderColor }}>
                                        <div className={`absolute top-2 right-2 ${orgBadgeBg} text-white text-[9px] font-bold px-2 py-0.5 rounded-full`}>
                                            {event.org}
                                        </div>
                                        <div className={`absolute top-2 right-14 w-2 h-2 rounded-full ${event.status === 'Próximo' ? 'bg-red-500 animate-pulse' : event.status === 'Realizado' ? 'bg-gray-400' : 'bg-green-500'}`}></div>
                                        <p className="text-sm text-gray-500 font-bold uppercase mb-1">{event.date}</p>
                                        <h3 className="text-base font-bold text-[#161a1d] leading-tight mb-2 pr-12">{event.city}</h3>
                                        <p className={`text-xs ${badgeBg} inline-block px-2 py-1 rounded font-medium`}>{event.type}</p>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="mt-6 flex gap-6 justify-center text-xs text-gray-500">
                            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-red-500 animate-pulse inline-block"></span> Próximo</span>
                            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-green-500 inline-block"></span> Programado</span>
                            <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full bg-gray-400 inline-block"></span> Realizado</span>
                            <span className="flex items-center gap-2"><span className="w-3 h-1 rounded bg-[#1e5b4f] inline-block"></span> SNSP</span>
                            <span className="flex items-center gap-2"><span className="w-3 h-1 rounded bg-[#9b2247] inline-block"></span> DIF</span>
                        </div>
                    </div>
                </section>
            );
        };

        const GoliSection = ({ area, index }) => {
            const isRight = index % 2 !== 0;
            return (
                <section className={`py-16 ${area.lightColor}`}>
                    <div className="container mx-auto px-4">
                        <div className={`flex flex-col lg:flex-row gap-12 items-center ${isRight ? 'lg:flex-row-reverse' : ''}`}>

                            {/* Texto descriptivo */}
                            <div className="w-full lg:w-1/3 text-center lg:text-left">
                                <div className={`inline-flex items-center justify-center w-16 h-16 rounded-full text-white text-2xl mb-6 shadow-lg ${area.color}`}>
                                    <i className={`fa-solid ${area.icon}`}></i>
                                </div>
                                <h4 className="text-sm font-bold text-[#9b2247] uppercase tracking-widest mb-2">{area.goli}</h4>
                                <h2 className="text-3xl font-patria font-bold text-gray-900 mb-4">{area.title}</h2>
                                <p className="text-gray-700 leading-relaxed mb-6">{area.description}</p>
                            </div>

                            {/* Tarjetas de Servicios */}
                            <div className="w-full lg:w-2/3">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {area.services.map((service, sIdx) => (
                                        <div key={sIdx} className="bg-white p-6 rounded-xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border-t-4" style={{ borderColor: area.id === 1 ? '#9b2247' : area.id === 2 ? '#1e5b4f' : area.id === 3 ? '#a57f2c' : '#161a1d' }}>
                                            <div className="mb-4 text-2xl opacity-80" style={{ color: area.id === 1 ? '#9b2247' : area.id === 2 ? '#1e5b4f' : area.id === 3 ? '#a57f2c' : '#161a1d' }}>
                                                <i className={`fa-solid ${service.icon}`}></i>
                                            </div>
                                            <h3 className="font-bold text-gray-800 text-sm mb-2">{service.title}</h3>
                                            <p className="text-xs text-gray-500 leading-relaxed">{service.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="bg-[#161a1d] text-white py-10 border-t-4 border-[#a57f2c]">
                <div className="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
                    <div>
                        <img
                            src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg"
                            alt="Gobierno de México"
                            className="h-10 mb-4 mx-auto md:mx-0 filter brightness-0 invert"
                        />
                        <p className="text-sm text-gray-400">Secretaría de Salud</p>
                    </div>
                    <div className="flex flex-col justify-center">
                        <p className="text-[#a57f2c] font-patria font-bold text-xl mb-2">2026</p>
                        <p className="text-gray-300 text-sm uppercase tracking-widest">Año de Margarita Maza</p>
                    </div>
                    <div>
                        <h4 className="font-bold text-[#a57f2c] mb-2">Punto Focal</h4>
                        <p className="text-sm text-gray-400">Servicio Nacional de Salud Pública - Tamaulipas</p>
                        <div className="mt-4 flex justify-center md:justify-start gap-4">
                            <a href="#" className="text-white hover:text-[#a57f2c]"><i className="fab fa-facebook fa-lg"></i></a>
                            <a href="#" className="text-white hover:text-[#a57f2c]"><i className="fab fa-twitter fa-lg"></i></a>
                            <a href="#" className="text-white hover:text-[#a57f2c]"><i className="fab fa-instagram fa-lg"></i></a>
                        </div>
                    </div>
                </div>
                <div className="mt-8 pt-8 border-t border-gray-800 text-center text-xs text-gray-500">
                    <p>Política de Privacidad | Términos y Condiciones</p>
                    <p className="mt-2">Gobierno de México © 2026</p>
                </div>
            </footer>
        );

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <Hero />
                    <CalendarGrid />
                    <div id="goli-areas">
                        {areasData.map((area, index) => (
                            <GoliSection key={area.id} area={area} index={index} />
                        ))}
                    </div>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
